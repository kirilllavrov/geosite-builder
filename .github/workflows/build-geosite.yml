---
name: Build Geosite
on:
  schedule:
    - cron: '0 2 * * *'  # yamllint disable-line rule:truthy
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Clone v2fly builder
        run: |
          git clone --depth 1 \
            https://github.com/v2fly/domain-list-community.git builder

      - name: Flatten data for builder
        run: |
          rm -rf builder/data
          mkdir -p builder/data

          # Шаг 1: копируем только непустые файлы доменов
          > /tmp/valid_lists.txt
          for dir in data/ru data/ads data/mobile \
                     data/streaming data/browser; do
            [ -d "$dir" ] || continue
            for file in "$dir"/*; do
              [ -f "$file" ] || continue
              fname=$(basename "$file")
              [[ "$fname" == category-* ]] && continue
              
              if grep -qE '^[a-zA-Z0-9]' "$file" 2>/dev/null; then
                cp "$file" "builder/data/$fname"
                echo "$fname" >> /tmp/valid_lists.txt
              else
                echo "⚠️ Пропущен (пустой): $fname" >&2
              fi
            done
          done

          # Шаг 2: обрабатываем category-файлы
          for cat in data/category-*; do
            [ -f "$cat" ] || continue
            cname=$(basename "$cat")
            
            # Фильтруем include: — только валидные списки
            {
              # Копируем комментарии
              grep '^#' "$cat" 2>/dev/null || true
              echo ""
              # Обрабатываем include:
              grep '^include:' "$cat" 2>/dev/null | while read -r line; do
                inc_name=$(echo "$line" | sed 's|include:.*\/||; s|include:||')
                if grep -qx "$inc_name" /tmp/valid_lists.txt 2>/dev/null; then
                  echo "$line" | sed 's|include:[^/]*/|include:|'
                else
                  echo "⚠️ Исключён из $cname: $inc_name" >&2
                fi
              done
            } > "builder/data/$cname"
            
            echo "✅ Обработан: $cname" >&2
          done

          echo "📁 Файлов в builder/data/: $(ls -1 builder/data/ | wc -l)" >&2

      - name: Generate geosite.dat
        run: |
          cd builder
          if ! go run ./ --datapath=./data \
            --outputdir=./output; then
            echo "❌ Ошибка сборки"
            exit 1
          fi
          mv ./output/dlc.dat ./output/geosite.dat
          echo "📊 Размер: $(ls -lh ./output/geosite.dat \
            | awk '{print $5}')"

      - name: Convert for Mihomo/Sing-box
        run: |
          cd builder
          go install github.com/metacubex/geo/cmd/geo@latest
          geo convert site \
            -i v2ray \
            -o sing \
            -f output/geosite.db \
            ./output/geosite.dat
          mkdir -p ../output
          cp ./output/geosite.dat ../output/
          cp ./output/geosite.db ../output/
          echo "📊 geosite.dat: $(ls -lh ../output/geosite.dat \
            | awk '{print $5}')"
          echo "📊 geosite.db: $(ls -lh ../output/geosite.db \
            | awk '{print $5}')"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Geosite build #${{ github.run_number }}  # yamllint disable-line rule:comments
          body: |
            Автоматическая сборка geosite для Mihomo/Sing-box

            🔄 Run: #${{ github.run_number }}
            🔗 Commit: ${{ github.sha }}
            📦 Форматы:
            - geosite.dat (V2Ray/Xray)
            - geosite.db (Sing-box/Mihomo)
          files: |
            output/geosite.dat
            output/geosite.db
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit source changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git status
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: sync source data ($(date +%Y-%m-%d))"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "✅ Исходники без изменений"
          fi